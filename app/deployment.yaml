apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: gitops-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: registry.access.redhat.com/ubi8/nginx-120:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: html
          configMap:
            name: app-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-html
  namespace: gitops-poc
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <body>
        <h1>GitOps POC 🚀</h1>
        <p>Deployed via ArgoCD + Tekton</p>
      </body>
    </html>
