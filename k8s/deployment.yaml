apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: hello-app }
  template:
    metadata:
      labels: { app: hello-app }
    spec:
      containers:
        - name: hello
          image: image-registry.openshift-image-registry.svc:5000/demo-app/hello-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080