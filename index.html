<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Dashboard | Production Node</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --success-color: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--accent-color); margin-bottom: 0.5rem; }
        p { color: #8b949e; line-height: 1.6; }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background-color: var(--success-color);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .details {
            margin-top: 2rem;
            text-align: left;
            font-size: 0.9rem;
            background: #0d1117;
            padding: 1rem;
            border-radius: 6px;
        }

        .code { font-family: monospace; color: #ff7b72; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nginx Container</h1>
    <p>High-performance static asset delivery node.</p>
    
    <div class="status-badge">SYSTEM OPERATIONAL</div>

    <div class="details">
        <strong>Environment Info:</strong>
        <ul style="list-style: none; padding-left: 0;">
            <li>Status: <span class="code">Running</span></li>
            <li>Port: <span class="code">8080</span></li>
            <li>User: <span class="code">nginx (unprivileged)</span></li>
            <li>Client IP: <span id="client-ip" class="code">Loading...</span></li>
        </ul>
    </div>
</div>

<script>
    // Simple logic to simulate SPA behavior or dynamic data
    document.addEventListener('DOMContentLoaded', () => {
        // In a real air-gapped scenario, this would likely call a local API 
        // For now, we'll just show the simulated local environment data
        const display = document.getElementById('client-ip');
        display.textContent = window.location.hostname;
        
        console.log("Nginx Service Dashboard Initialized.");
    });
</script>

</body>
</html>
